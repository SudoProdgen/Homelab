services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:sts
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    env_file: .env
    ports:
      - 9443:9443

volumes:
  portainer_data:
    name: portainer_data
