services:
  homepage:
    container_name: ${NAME}
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    ports:
      - ${PORT}:3000
    volumes:
      - ${VOLUME_CONFIG}:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${VOLUME_DATA}:/mnt/data:ro

    env_file:
      - .env
