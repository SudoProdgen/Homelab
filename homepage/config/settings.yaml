---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/settings/


background:
  image: https://images.unsplash.com/photo-1476400424721-e25994a9f0ff?ixlib=rb-4.1.0&q=85&fm=jpg&crop=entropy&cs=srgb&dl=sam-ferrara-QWXMd3DUFW8-unsplash.jpg
  blur: xs # sm, "", md, xl... see https://tailwindcss.com/docs/backdrop-blur
  saturate: 50 # 0, 50, 100... see https://tailwindcss.com/docs/backdrop-saturate
  brightness: 50 # 0, 50, 75... see https://tailwindcss.com/docs/backdrop-brightness
  opacity: 90 # 0-100

cardBlur: xs # xs, md, etc... see https://tailwindcss.com/docs/backdrop-blur

providers:
  openweathermap: openweathermapapikey
  weatherapi: weatherapiapikey

layout:
  Services:
    style: row
    columns: 3
  Utilities:
    columns: 2
  Arr stack:
    columns: 3

headerStyle: boxedWidgets

