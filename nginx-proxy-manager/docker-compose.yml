services:
  app:
    container_name: nginx-proxy-manager
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - 80:80
      - 81:81
      - 443:443
    volumes:
      - /srv/containers/nginx-proxy-manager/data:/data
      - /srv/containers/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    env_file: .env
